# coderev — Automated PR Review
#
# This workflow runs coderev on every pull request and posts the review
# as a PR comment.
#
# Setup:
# 1. Add your DEEPSEEK_API_KEY to GitHub Variables (Settings > Variables > Actions)
# 2. (Optional) Add GITHUB_TOKEN if you use a PAT with wider scope
#    (defaults to the built-in GITHUB_TOKEN which has read-only for forks)

name: coderev-review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install coderev
        run: npm install -g coderev-cli

      - name: Generate diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr_diff.diff
          echo "diff_size=$(wc -c < /tmp/pr_diff.diff)" >> $GITHUB_OUTPUT

      - name: Run coderev review
        id: review
        env:
          DEEPSEEK_API_KEY: ${{ vars.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          echo "=== DIFF SIZE ==="
          wc -c /tmp/pr_diff.diff
          echo "=== RUNNING CODEREV ==="
          cat /tmp/pr_diff.diff | coderev review --output markdown > /tmp/review_output.md 2>/tmp/review_stderr.txt
          CODEREV_EXIT=$?
          echo "=== CODEREV EXIT CODE: $CODEREV_EXIT ==="
          if [ -s /tmp/review_stderr.txt ]; then
            echo "=== STDERR ==="
            cat /tmp/review_stderr.txt
          fi
          echo "=== STDOUT (first 500 chars) ==="
          head -c 500 /tmp/review_output.md
          echo ""
          echo "review=$(cat /tmp/review_output.md)" >> $GITHUB_OUTPUT

      - name: Post review comment
        uses: actions/github-script@v7
        env:
          REVIEW: ${{ steps.review.outputs.review }}
        with:
          script: |
            const review = process.env.REVIEW;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.rest.issues.listComments({
              owner, repo, issue_number,
            });

            for (const comment of comments.data) {
              if (comment.user.type === 'Bot' && comment.body.includes('Code Review Report')) {
                await github.rest.issues.deleteComment({
                  owner, repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner, repo, issue_number, body: review,
            });
