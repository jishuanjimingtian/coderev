name: coderev-review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install coderev
        run: npm install -g coderev-cli

      - name: Generate diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr_diff.diff
          echo "diff_size=$(wc -c < /tmp/pr_diff.diff)" >> $GITHUB_OUTPUT

      - name: Run coderev review
        id: review
        shell: bash
        env:
          DEEPSEEK_API_KEY: ${{ vars.DEEPSEEK_API_KEY }}
        run: |
          set +e
          cat /tmp/pr_diff.diff | coderev review --output markdown --single > /tmp/review_output.md 2>/tmp/review_stderr.txt
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== STDERR ==="
            cat /tmp/review_stderr.txt
          fi
          echo "review<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/review_output.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post review comment
        if: steps.review.outputs.exit_code == '0'
        uses: actions/github-script@v7
        env:
          REVIEW: ${{ steps.review.outputs.review }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            for (const c of comments.data) {
              if (c.user.type === 'Bot' && c.body?.includes('Code Review Report')) {
                await github.rest.issues.deleteComment({ owner, repo, comment_id: c.id });
              }
            }
            await github.rest.issues.createComment({ owner, repo, issue_number, body: process.env.REVIEW });
