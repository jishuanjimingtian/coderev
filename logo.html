<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>coderev Logo v2</title>
<style>
body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #0f172a; font-family: system-ui, sans-serif; }
.logo-grid { display: flex; flex-direction: column; align-items: center; gap: 60px; }
.row { display: flex; gap: 60px; align-items: center; flex-wrap: wrap; justify-content: center; }
.label { color: #475569; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-top: 8px; text-align: center; }
</style>
</head>
<body>
<div class="logo-grid">

  <!-- Variant A: Icon + Wordmark (horizontal) -->
  <div>
    <svg width="440" height="96" viewBox="0 0 440 96" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="a-code" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#6366f1"/>
          <stop offset="100%" stop-color="#06b6d4"/>
        </linearGradient>
        <linearGradient id="a-check" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#10b981"/>
          <stop offset="80%" stop-color="#34d399"/>
        </linearGradient>
        <linearGradient id="a-dot1" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#6366f1"/>
          <stop offset="100%" stop-color="#8b5cf6"/>
        </linearGradient>
        <linearGradient id="a-dot2" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#f59e0b"/>
          <stop offset="100%" stop-color="#ef4444"/>
        </linearGradient>
        <linearGradient id="a-dot3" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#10b981"/>
          <stop offset="100%" stop-color="#34d399"/>
        </linearGradient>
        <linearGradient id="a-text" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#e2e8f0"/>
          <stop offset="100%" stop-color="#94a3b8"/>
        </linearGradient>
      </defs>

      <!-- Rounded code block -->
      <rect x="8" y="8" width="80" height="80" rx="20" fill="url(#a-code)" opacity="0.1"/>
      <rect x="12" y="12" width="72" height="72" rx="16" fill="url(#a-code)" opacity="0.15"/>
      <text x="48" y="62" font-family="monospace" font-size="36" font-weight="bold" fill="url(#a-code)" text-anchor="middle">&lt;/&gt;</text>

      <!-- Check -->
      <polyline points="30,48 42,62 66,34" fill="none" stroke="url(#a-check)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- 3 dots -->
      <circle cx="38" cy="22" r="4" fill="url(#a-dot1)"/>
      <circle cx="50" cy="22" r="4" fill="url(#a-dot2)"/>
      <circle cx="62" cy="22" r="4" fill="url(#a-dot3)"/>

      <!-- Text -->
      <text x="110" y="52" font-family="system-ui" font-size="32" font-weight="700" fill="url(#a-text)" letter-spacing="-1">coderev</text>
      <text x="112" y="76" font-family="system-ui" font-size="12" fill="#475569" letter-spacing="1">parallel AI code review</text>
    </svg>
  </div>

  <!-- Variant B: Icon only (avatar / favicon) -->
  <div>
    <svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="b-bg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#1e293b"/>
          <stop offset="100%" stop-color="#0f172a"/>
        </linearGradient>
        <linearGradient id="b-border" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#6366f1"/>
          <stop offset="50%" stop-color="#06b6d4"/>
          <stop offset="100%" stop-color="#10b981"/>
        </linearGradient>
        <linearGradient id="b-code" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#818cf8"/>
          <stop offset="100%" stop-color="#22d3ee"/>
        </linearGradient>
        <linearGradient id="b-check" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#10b981"/>
          <stop offset="100%" stop-color="#6ee7b7"/>
        </linearGradient>
        <linearGradient id="b-d1" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#6366f1"/>
          <stop offset="100%" stop-color="#a78bfa"/>
        </linearGradient>
        <linearGradient id="b-d2" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#f59e0b"/>
          <stop offset="100%" stop-color="#f87171"/>
        </linearGradient>
      </defs>

      <!-- Rounded square bg -->
      <rect x="8" y="8" width="144" height="144" rx="36" fill="url(#b-bg)" stroke="url(#b-border)" stroke-width="2"/>

      <!-- Code bracket -->
      <text x="80" y="100" font-family="monospace" font-size="54" font-weight="bold" fill="url(#b-code)" text-anchor="middle">&lt;/&gt;</text>

      <!-- Checkmark -->
      <polyline points="52,90 70,112 110,70" fill="none" stroke="url(#b-check)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Dots -->
      <circle cx="60" cy="38" r="5" fill="url(#b-d1)"/>
      <circle cx="76" cy="38" r="5" fill="url(#b-d2)"/>
      <circle cx="92" cy="38" r="5" fill="url(#b-check)"/>
    </svg>
    <div class="label">icon / avatar</div>
  </div>

</div>

<p style="color:#334155; font-size:13px; margin-top:32px;">coderev — 3 agents · confidence scoring · AI code review</p>
</body>
</html>
